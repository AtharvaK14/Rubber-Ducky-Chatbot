<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ducky — Rubber Duck Debugger</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="ducky.css"/>
</head>
<body>

<header>
  <div class="logo">
    <div class="duck-icon">🦆</div>
    <div>
      <div class="logo-text">Du<span>cky</span></div>
      <div class="logo-sub">Rubber Duck Debugger v2.0</div>
    </div>
  </div>

  <div class="tone-toggle">
    <span class="tone-label">Tone</span>
    <button class="tone-btn active" id="btn-quack" onclick="setTone('quack')">🦆 Quacky</button>
    <button class="tone-btn" id="btn-pro" onclick="setTone('pro')">💼 Pro</button>
  </div>
</header>

<main>
  <!-- SIDEBAR: Quick Prompts -->
  <aside class="sidebar">
    <div class="sidebar-title">Quick prompts</div>

    <button class="quick-chip" onclick="sendQuick('I have a TypeError in my Python function')">
      <span class="chip-tag tag-py">PY</span>TypeError in function
    </button>
    <button class="quick-chip" onclick="sendQuick('I got a NameError, name is not defined')">
      <span class="chip-tag tag-py">PY</span>NameError undefined
    </button>
    <button class="quick-chip" onclick="sendQuick('I have a SyntaxError invalid syntax')">
      <span class="chip-tag tag-py">PY</span>SyntaxError
    </button>
    <button class="quick-chip" onclick="sendQuick('I am stuck in an infinite loop')">
      <span class="chip-tag tag-py">PY</span>Infinite loop
    </button>
    <button class="quick-chip" onclick="sendQuick('I have a ZeroDivisionError in my code')">
      <span class="chip-tag tag-py">PY</span>ZeroDivisionError
    </button>
    <button class="quick-chip" onclick="sendQuick('I am getting an IndexError index out of range')">
      <span class="chip-tag tag-py">PY</span>IndexError
    </button>

    <button class="quick-chip" onclick="sendQuick('I have an Uncaught TypeError in JavaScript')">
      <span class="chip-tag tag-js">JS</span>Uncaught TypeError
    </button>
    <button class="quick-chip" onclick="sendQuick('I have an Uncaught ReferenceError in JavaScript')">
      <span class="chip-tag tag-js">JS</span>ReferenceError
    </button>
    <button class="quick-chip" onclick="sendQuick('I have a Promise rejection unhandled')">
      <span class="chip-tag tag-js">JS</span>Promise rejection
    </button>
    <button class="quick-chip" onclick="sendQuick('I have a CORS error in my fetch request')">
      <span class="chip-tag tag-js">JS</span>CORS error
    </button>

    <button class="quick-chip" onclick="sendQuick('I have a segmentation fault in C++')">
      <span class="chip-tag tag-cpp">C++</span>Segfault
    </button>
    <button class="quick-chip" onclick="sendQuick('I have a memory leak in my C++ application')">
      <span class="chip-tag tag-cpp">C++</span>Memory leak
    </button>

    <button class="quick-chip" onclick="sendQuick('tell me a joke')">
      <span class="chip-tag tag-gen">FUN</span>Tell me a joke
    </button>
  </aside>

  <!-- CHAT AREA -->
  <div class="chat-wrapper">
    <div class="chat-box" id="chat-box">
      <!-- Welcome message injected by JS -->
    </div>

    <div class="input-area">
      <textarea
        id="user-input"
        rows="2"
        placeholder="Describe your bug or error... (Enter to send, Shift+Enter for newline)"
      ></textarea>
      <button class="send-btn" onclick="handleSend()">
        Send ▶
      </button>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value" id="stat-msgs">0</span>
        <span class="stat-label">Messages</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value" id="stat-rules">50+</span>
        <span class="stat-label">Rules</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value" id="stat-langs">3</span>
        <span class="stat-label">Languages</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value" id="stat-matched">—</span>
        <span class="stat-label">Last Rule</span>
      </div>
    </div>
  </div>
</main>

<script src="ducky.js"></script>
</body>
</html>
